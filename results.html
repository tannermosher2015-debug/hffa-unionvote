<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>HFFA Local 1463 — PAC Board Vote Results</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f0f2f5; min-height: 100vh; color: #0d1f3c; }
    .page-hdr { background: #0d1f3c; padding: 20px 16px; text-align: center; }
    .hdr-badge { display: inline-block; background: #c8a951; color: #0d1f3c; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; padding: 3px 9px; border-radius: 3px; margin-bottom: 8px; }
    .hdr-title { color: #fff; font-size: 20px; font-weight: 700; }
    .body { padding: 16px 14px 40px; max-width: 560px; margin: 0 auto; }
    .card { background: #fff; border-radius: 8px; padding: 16px; border: 1px solid #dde1e8; margin-bottom: 16px; }
    .field-label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 7px; }
    input[type="password"] { width: 100%; padding: 11px 13px; border-radius: 7px; border: 1.5px solid #dde1e8; font-size: 16px; color: #0d1f3c; outline: none; font-family: inherit; }
    input[type="password"]:focus { border-color: #0d1f3c; }
    .btn { width: 100%; margin-top: 12px; padding: 13px; background: #0d1f3c; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }
    .err { color: #8b1a1a; font-size: 13px; font-weight: 600; margin-top: 10px; display: none; }
    .err.show { display: block; }
    .tally-hdr { background: #0d1f3c; color: #fff; padding: 11px 16px; font-size: 14px; font-weight: 700; border-radius: 8px 8px 0 0; }
    .tally-row { display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #eef1f6; font-size: 15px; }
    .tally-row:last-child { border-bottom: none; }
    .pill { font-weight: 700; }
    .pill.approve { color: #1b6b2f; }
    .pill.deny { color: #8b1a1a; }
    .total { font-size: 13px; color: #6b7280; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eef1f6; }
    th { color: #6b7280; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
    .hidden { display: none; }
    .cand-tally {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 10px 16px; border-bottom: 1px solid #eef1f6;
    }
    .cand-tally:last-child { border-bottom: none; }
    .ct-name { font-size: 13px; font-weight: 600; color: #0d1f3c; }
    .ct-district { font-size: 11px; color: #6b7280; margin-top: 1px; }
    .ct-counts { display: flex; gap: 18px; flex-shrink: 0; font-size: 15px; font-weight: 700; }
    .ct-counts .approve { color: #1b6b2f; min-width: 22px; text-align: right; }
    .ct-counts .deny { color: #8b1a1a; min-width: 22px; text-align: right; }
    .tally-hdr .legend { float: right; font-weight: 400; font-size: 11px; color: #c8a951; }
  </style>
</head>
<body>
  <div class="page-hdr">
    <div class="hdr-badge">IAFF LOCAL 1463</div>
    <div class="hdr-title">PAC Board Vote — Results</div>
  </div>
  <div class="body">
    <div class="card" id="loginCard">
      <label class="field-label" for="pass">Results Password</label>
      <input type="password" id="pass" placeholder="Enter password" autocomplete="off">
      <button class="btn" onclick="loadResults()">View Tally</button>
      <div class="err" id="loginErr">Incorrect password.</div>
    </div>

    <div id="resultsView" class="hidden">
      <p class="total" id="totalLine"></p>
      <div id="tallies"></div>
      <div class="card">
        <div class="tally-hdr" style="border-radius:8px 8px 0 0; margin:-16px -16px 12px;">Ballots Cast</div>
        <table>
          <thead><tr><th>Name</th><th>Time</th></tr></thead>
          <tbody id="voterRows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let pass = "";
    async function loadResults() {
      pass = document.getElementById('pass').value;
      const err = document.getElementById('loginErr');
      err.classList.remove('show');
      try {
        const res = await fetch('/api/results', { headers: { 'x-results-pass': pass } });
        if (res.status === 401) { err.classList.add('show'); return; }
        if (!res.ok) throw new Error('failed');
        const d = await res.json();
        document.getElementById('loginCard').classList.add('hidden');
        document.getElementById('resultsView').classList.remove('hidden');
        document.getElementById('totalLine').textContent = d.total + ' ballot' + (d.total === 1 ? '' : 's') + ' cast';

        // Per-candidate tallies, grouped by division in first-seen order.
        const divisions = [];
        (d.candidates || []).forEach(function(c) {
          let g = divisions.find(function(x) { return x.name === c.division; });
          if (!g) { g = { name: c.division, rows: [] }; divisions.push(g); }
          g.rows.push(c);
        });
        document.getElementById('tallies').innerHTML = divisions.map(function(g) {
          const rows = g.rows.map(function(c) {
            return '<div class="cand-tally"><div>' +
                '<div class="ct-name">' + esc(c.name) + '</div>' +
                '<div class="ct-district">' + esc(c.district) + '</div>' +
              '</div><div class="ct-counts">' +
                '<span class="approve">' + c.Approve + '</span>' +
                '<span class="deny">' + c.Deny + '</span>' +
              '</div></div>';
          }).join('');
          return '<div class="card" style="padding:0; overflow:hidden;">' +
              '<div class="tally-hdr">' + esc(g.name || 'Division') +
                '<span class="legend">Approve&nbsp;&nbsp;/&nbsp;&nbsp;Deny</span></div>' +
              rows + '</div>';
        }).join('');

        const voterRows = (d.voters || []).map(function(v) {
          const t = new Date(v.ts).toLocaleString();
          return '<tr><td>' + esc(v.name) + '</td><td>' + esc(t) + '</td></tr>';
        }).join('');
        document.getElementById('voterRows').innerHTML = voterRows;
      } catch (e) {
        err.textContent = 'Could not load results. Try again.';
        err.classList.add('show');
      }
    }
    function esc(s) { return String(s).replace(/[&<>"']/g, function(c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }
    document.getElementById('pass').addEventListener('keydown', function(e) { if (e.key === 'Enter') loadResults(); });
  </script>
</body>
</html>
